# ============================================================================
#  L2 Offline Server - One-Click Launcher settings
#  Edit these to match your machine. Lines starting with # are comments.
# ============================================================================

[java]
# Folder that contains bin\java.exe. Leave BLANK to auto-detect in this order:
#   1) a bundled runtime at  dist\jre\bin\java.exe   (for a portable pack)
#   2) the JAVA_HOME environment variable
#   3) java on your PATH
# You need JDK/JRE 25 for the game server.
JavaHome=

[database]
Host=localhost
Port=3306
User=root
Password=
Database=l2jmobiusinterlude
# Folder containing mysql.exe / mysqld.exe.
#   - External MySQL/XAMPP:  an absolute path, e.g. C:\xampp\mysql\bin
#   - Bundled MariaDB pack:   a path RELATIVE to dist\, e.g. mariadb\bin
# Relative paths are resolved against the dist\ folder, so the pack stays portable.
MysqlBin=C:\xampp\mysql\bin
# DataDir: set ONLY for a bundled/portable MariaDB. It is the MariaDB data folder.
#   - Leave BLANK when using an external MySQL/XAMPP (that engine owns its own data dir).
#   - For the bundled pack this is set to  mariadb\data  (relative to dist\); on first run
#     the launcher initializes it (creates root with no password) before starting the DB.
DataDir=
# If the DB port is not open, try to start the DB engine automatically.
AutoStartMysql=true

[servers]
StartLogin=true
StartGame=true
# Start the Python FPC "brain" too (needs its .env configured first). Off by default.
StartBrain=false
